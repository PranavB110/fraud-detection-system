name: CI/CD — Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          cd backend
          pytest test_main.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/fraud-detection-system
            git pull
            sudo docker build --no-cache -t fraud-api ~/fraud-detection-system/backend/
            sudo docker rm -f fraud-container
            sudo docker run -d -p 8000:8000 --name fraud-container --restart always fraud-api
            sudo docker build -t frontend-app ~/fraud-detection-system/frontend/
            sudo docker rm -f frontend-container
            sudo docker run -d -p 80:80 --name frontend-container --restart always frontend-app
            sleep 5
            curl -f http://localhost:8000/health || exit 1